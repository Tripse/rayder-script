# pls use subdomain's httpx_result.txt
vars:
  URL: "httpx_result.txt"
  USAGE: "rayder -w workflow.yaml URL=httpx_result.txt"

parallel: false

modules:  
  - name: gau
    silent: true
    cmds:
      - cat {{URL}} | gauu | tee -a gau_result.txt

  - name: katana
    silent: true
    cmds:
      # if get gov.cn use -fs fqdn, because dn is subdomain grab it will grabing more gov website out of ranges.
      - cat {{URL}} | katana -d 5 -jc -jsl -xhr -kf all -fx -fs rdn | tee -a katana_result.txt

  - name: hakrawler
    silent: true
    cmds:
      - cat {{URL}} | hakrawler | tee -a hakrawler_result.txt

  - name: conform & filter
    silent: true
    cmds:
      - cat gau_result.txt katana_result.txt hakrawler_result.txt | anew urls_result.txt
      - cat urls_result.txt | anewp | tee -a params_result.txt

  - name: sensitive
    silent: true
    cmds:
      - cat urls_result.txt | gff intersting_ext_bounty | httpx -silent -mc 200,404 | tee -a sensitive_output.txt
      - cat sensitive_output.txt | grep -v -E '\.(jpg|jpeg|gif|png|PNG|svg|ico|js|com|css|jhtml|html|do|jsp|php|asp|aspx|jspx|tif|tiff|ttf|woff|woff2)$' | tee -a sensitive_result.txt

  - name: dddd 
    silent: true
    cmds:
      - dddd -t httpx_result.txt -o dddd_result.txt

  - name: nuclei dast
    silent: true
    cmds:
      - cat params_result.txt | uro | nuclei -t ~/nuclei-tripse/dast/ -dast | tee -a dast_template_result.txt

  - name: nuclei bounty
    silent: true
    cmds:
      - cat {{URL}} | nuclei -t ~/nuclei-tripse/bounty/ | tee -a bounty_template_result.txt

  - name: clean
    silent: true
    cmds:
      - rm -rf gau_result.txt katana_result.txt hakrawler_result.txt sensitive_output.txt 